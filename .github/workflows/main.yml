name: cda_offline_skf

on:
  schedule:
    - cron: '0 5 * * *'  # Todo dia às 02:00 no Brasil (UTC-3)
  workflow_dispatch:

jobs:
  run-notebook:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Instalar dependências
        run: |
          pip install -r requirements.txt

      - name: Executar script
        env:
          GOOGLE_SERVICE_ACCOUNT: ${{ secrets.GOOGLE_SERVICE_ACCOUNT }}
          SKF_GERMANO: ${{ secrets.SKF_GERMANO }}
          SKF_UBU: ${{ secrets.SKF_UBU }}
          SKF_KEY: ${{ secrets.SKF_KEY }}
          SKF_URL: ${{ secrets.SKF_URL }}
        run: |
          python cda_offline_skf.py
